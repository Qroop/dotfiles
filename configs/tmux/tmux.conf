set -g prefix C-f
unbind C-b
bind C-f send-prefix

set-option -g status-position top
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -sg escape-time 0
set -g status-keys emacs
set -g mouse on
set -g mode-keys vi
set -g renumber-windows on

bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

bind h select-pane -L
bind l select-pane -R
bind k select-pane -U
bind j select-pane -D

bind R command-prompt -I "#{session_name}" "rename-session '%%'" 
bind r command-prompt -I "#{window_name}" "rename-window '%%'"
bind n new-window
bind X confirm-before -p "Kill session #S? (y/n)" kill-session 
bind-key -n C-a run-shell "tmux neww ~/.local/bin/tmux-sessionizer"

bind v copy-mode
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi V send -X select-line
bind -T copy-mode-vi C-v send -X rectangle-toggle
bind -T copy-mode-vi y send -X copy-pipe "xclip -selection clipboard -in"
bind -T copy-mode-vi Escape send -X cancel

unbind '"'
unbind %

set -g command-alias[0] reload='source-file ~/.config/tmux/tmux.conf' 

# Empty left and right sections
set -g status-left ""
set -g status-right ""

# Center the window list
set -g status-justify centre

# Style the windows however you like
setw -g window-status-format " #I:#W"
setw -g window-status-current-format " #[fg=green]#I:#W"
set-option -g status-style bg=default
