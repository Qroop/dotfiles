set -g prefix C-f
unbind C-b
bind C-f send-prefix

set-option -g status-position top
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -sg escape-time 0
set -g status-keys emacs
set -g mouse on
set -g mode-keys vi
set -g renumber-windows on

bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

bind h select-pane -L
bind l select-pane -R
bind k select-pane -U
bind j select-pane -D

bind R command-prompt -I "#{session_name}" "rename-session '%%'" 
bind r command-prompt -I "#{window_name}" "rename-window '%%'"
bind-key -n C-a run-shell "tmux neww ~/.local/bin/tmux-sessionizer"
bind n new-window
bind S new-window
bind X confirm-before -p "Kill session #S? (y/n)" kill-session

bind v copy-mode
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi V send -X select-line
bind -T copy-mode-vi C-v send -X rectangle-toggle
bind -T copy-mode-vi y send -X copy-pipe "xclip -selection clipboard -in"
bind -T copy-mode-vi Escape send -X cancel

bind -n C-Tab select-window -n
bind -n C-S-Tab select-window -p

set -g command-alias[0] reload='source-file ~/.config/tmux/tmux.conf' 
